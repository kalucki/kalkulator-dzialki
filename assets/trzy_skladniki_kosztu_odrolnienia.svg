<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Infografika przedstawiająca trzy główne składniki kosztu odrolnienia: należność jednorazowa do 43,72 zł na metr kwadratowy, opłaty roczne 10 procent przez 10 lat, oraz koszty dodatkowe od 1500 do 4500 zł.</desc>
